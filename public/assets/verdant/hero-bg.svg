<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- Verdant hero background — stone and still water, no objects.
       Wide crop; safe to bleed with preserveAspectRatio slice. -->
  <rect width="1600" height="900" fill="#14181a"/>
  <!-- dark organic masses, settling toward the ground -->
  <path d="M 0 560 C 280 480 540 620 860 540 C 1140 470 1380 580 1600 510 L 1600 900 L 0 900 Z" fill="#171c1d"/>
  <path d="M 0 680 C 340 600 700 740 1060 660 C 1300 606 1480 690 1600 640 L 1600 900 L 0 900 Z" fill="#1a211f"/>
  <path d="M 0 800 C 420 740 880 850 1300 780 C 1420 760 1540 790 1600 775 L 1600 900 L 0 900 Z" fill="#1d251f"/>
  <!-- a stone presence, upper right, barely darker than the air -->
  <path d="M 1190 60 C 1340 30 1520 80 1600 160 L 1600 0 L 1210 0 C 1190 18 1180 42 1190 60 Z" fill="#161b1c"/>
  <!-- water rings, two quiet places -->
  <g fill="none" stroke="#8fa68e" stroke-linecap="round">
    <ellipse cx="440" cy="700" rx="60" ry="14" stroke-width="1.5" opacity="0.10"/>
    <ellipse cx="440" cy="700" rx="110" ry="26" stroke-width="1.5" opacity="0.07"/>
    <ellipse cx="440" cy="700" rx="170" ry="40" stroke-width="1.5" opacity="0.04"/>
    <ellipse cx="1180" cy="800" rx="45" ry="10" stroke-width="1.5" opacity="0.09"/>
    <ellipse cx="1180" cy="800" rx="90" ry="20" stroke-width="1.5" opacity="0.05"/>
  </g>
  <!-- drift lines in the air -->
  <g fill="none" stroke="#ece4d1" stroke-linecap="round">
    <path d="M 180 250 C 420 238 640 258 920 244" stroke-width="1.5" opacity="0.05"/>
    <path d="M 520 340 C 780 330 1040 348 1340 334" stroke-width="1.5" opacity="0.04"/>
  </g>
  <!-- grain -->
  <g fill="#ece4d1">
    <circle cx="240" cy="160" r="1.6" opacity="0.06"/>
    <circle cx="700" cy="110" r="1.4" opacity="0.05"/>
    <circle cx="980" cy="420" r="1.6" opacity="0.05"/>
    <circle cx="1420" cy="300" r="1.4" opacity="0.06"/>
    <circle cx="360" cy="470" r="1.4" opacity="0.04"/>
    <circle cx="1240" cy="560" r="1.6" opacity="0.04"/>
    <circle cx="820" cy="640" r="1.4" opacity="0.04"/>
    <circle cx="90" cy="350" r="1.4" opacity="0.05"/>
  </g>
  <!-- one ember of gold -->
  <circle cx="1090" cy="190" r="3" fill="#c9a35f" opacity="0.4"/>
</svg>
