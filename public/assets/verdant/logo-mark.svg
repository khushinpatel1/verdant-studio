<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Verdant Studio mark — one leaf, brushed once -->
  <path d="M 25 111 C 19 70 40 30 84 13 C 90 11 95 15 94 21 C 86 64 63 97 32 113 C 28 115 25 114 25 111 Z"
        fill="#87a384"/>
  <!-- the vein, drawn dark so it reads as a cut on any ground -->
  <path d="M 33 104 C 46 78 62 50 82 25"
        fill="none" stroke="#1d231d" stroke-width="3.5" stroke-linecap="round" opacity="0.55"/>
  <!-- the flick of the stem leaving the stroke -->
  <path d="M 25 111 C 21 118 15 122 8 124"
        fill="none" stroke="#87a384" stroke-width="4" stroke-linecap="round"/>
</svg>
