    <path d="M 25 111 C 21 118 15 122 8 124"
          fill="none" stroke="#87a384" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="600" y="404" text-anchor="middle"
        font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
        font-size="86" fill="#ece4d1">Verdant Studio</text>
  <!-- a short gold rule, the only warm thing -->
  <path d="M 568 438 H 632" stroke="#c9a35f" stroke-width="2"/>
  <text x="600" y="486" text-anchor="middle"
        font-family="'Fragment Mono', ui-monospace, 'Courier New', monospace"
        font-size="24" letter-spacing="0.5" fill="#8fa68e">Software grown for people, not advertisers.</text>
