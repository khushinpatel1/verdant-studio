  <!-- ground shadow forms -->
  <path d="M 0 540 C 300 500 620 575 900 530 C 1060 505 1150 540 1200 525 L 1200 630 L 0 630 Z" fill="#191e1f"/>
  <!-- the mark, large and centered -->
  <g transform="translate(503,96) scale(1.52)">
    <path d="M 25 111 C 19 70 40 30 84 13 C 90 11 95 15 94 21 C 86 64 63 97 32 113 C 28 115 25 114 25 111 Z"
          fill="#87a384"/>
    <path d="M 33 104 C 46 78 62 50 82 25"
